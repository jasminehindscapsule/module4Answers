<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lab #6 - Fetch Data</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9"
    crossorigin="anonymous"
  />
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-4">Posts from JSON Placeholder</h1>
    <div class="row g-4" id="post-grid"></div>
  </div>

  <template id="post-card-template">
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title text-capitalize"></h5>
          <p class="card-text"></p>
        </div>
      </div>
    </div>
  </template>

  <script>
    const DEFAULT_LIMIT = 10;

    function addPostCard(post) {
      const template = document
        .getElementById('post-card-template')
        .content.cloneNode(true);

      template.querySelector('.card-title').innerText = post.title;
      template.querySelector('.card-text').innerText = post.body;

      document.getElementById('post-grid').appendChild(template);
    }

    function loadPosts(limit = DEFAULT_LIMIT) {
      fetch(`https://jsonplaceholder.typicode.com/posts?_limit=${limit}`)
        .then((response) => response.json())
        .then((posts) => posts.forEach(addPostCard))
        .catch((error) => console.error('Failed to load posts:', error));
    }

    // uses the default limit of 10 when the page loads
    loadPosts();
  </script>
</body>
</html>
